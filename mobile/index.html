const filters=new Map();let filterId='',dragId='';const esc=s=>{const d=document.createElement('div');d.textContent=String(s??'—');return d.innerHTML};
function matched(){const q=document.getElementById('search').value.trim().toLowerCase();return rows.filter(r=>{if(q&&!Object.values(r).join(' ').toLowerCase().includes(q))return false;for(const[id,f]of filters){const v=String(r[id]??'').toLowerCase();if(f.mode==='enum'&&!f.values.some(x=>x.toLowerCase()===v))return false;if(f.mode==='fuzzy'){const x=f.value.toLowerCase();if(f.op==='contains'&&!v.includes(x))return false;if(f.op==='equals'&&v!==x)return false;if(f.op==='notContains'&&v.includes(x))return false;if(f.op==='empty'&&v)return false;if(f.op==='notEmpty'&&!v)return false}}return true})}
function render(){const data=matched(),visible=fields.filter(f=>!f.hidden);document.getElementById('count').textContent=data.length;const t=document.createElement('table');t.className='grid';t.style.width=Math.max(720,visible.length*130)+'px';const hr=t.createTHead().insertRow();visible.forEach(f=>{const th=document.createElement('th');th.dataset.id=f.id;if(f.id==='actions')th.textContent=f.label;else{const note=f.id==='seq'?'<span class="marker" onclick="showNote(event,1)">1</span>':f.id==='province'?'<span class="marker" onclick="showNote(event,4)">4</span>':f.id==='company'?'<span class="marker" onclick="showNote(event,5)">5</span>':'';th.innerHTML=`⋮⋮ ${esc(f.label)}<button class="filter ${filters.has(f.id)?'on':''}" onclick="openFilter(event,'${f.id}')">⌄</button>${note}`;bindDrag(th,f.id)}hr.appendChild(th)});const body=t.createTBody();data.forEach(r=>{const tr=body.insertRow();visible.forEach(f=>{const td=tr.insertCell();td.textContent=f.id==='actions'?'查看详情　删除':r[f.id]||'—';if(f.id==='company')td.className='company';if(f.id==='actions')td.className='ops'})});const w=document.getElementById('wrap');w.innerHTML='';w.appendChild(t)}
function openFilter(e,id){e.stopPropagation();filterId=id;const f=fields.find(x=>x.id===id),p=document.getElementById('pop'),rect=e.currentTarget.getBoundingClientRect();document.getElementById('popTitle').textContent=(f.mode==='enum'?'枚举筛选：':'模糊查询：')+f.label;document.getElementById('fuzzy').style.display=f.mode==='fuzzy'?'block':'none';document.getElementById('enum').style.display=f.mode==='enum'?'block':'none';if(f.mode==='enum'){const selected=new Set(filters.get(id)?.values||[]),vals=[...new Set(rows.map(r=>String(r[id]||'')))];document.getElementById('enum').innerHTML=vals.map(v=>`<label><input type="checkbox" value="${esc(v)}" ${selected.has(v)?'checked':''}>${esc(v||'（空）')}</label>`).join('')}else{const old=filters.get(id);document.getElementById('operator').value=old?.op||'contains';document.getElementById('filterValue').value=old?.value||''}p.style.left=Math.max(8,Math.min(rect.left,innerWidth-278))+'px';p.style.top=Math.min(rect.bottom+6,innerHeight-310)+'px';p.classList.add('show')}
function applyFilter(){const f=fields.find(x=>x.id===filterId);if(f.mode==='enum'){const values=[...document.querySelectorAll('#enum input:checked')].map(x=>x.value);if(values.length)filters.set(filterId,{mode:'enum',values});else filters.delete(filterId)}else{const op=document.getElementById('operator').value,value=document.getElementById('filterValue').value.trim();if(value||op==='empty'||op==='notEmpty')filters.set(filterId,{mode:'fuzzy',op,value});else filters.delete(filterId)}closePop();render()}function clearFilter(){filters.delete(filterId);closePop();render()}function closePop(){document.getElementById('pop').classList.remove('show')}
const mobDefaultConditionFields=['company','position','employmentType'];let mobActiveConditionFields=[...mobDefaultConditionFields];
function mobConditionValue(id){const rule=filters.get(id);return rule?.mode==='enum'?(rule.values[0]||''):(rule?.value||'')}
function renderMobConditionFields(){const box=document.getElementById('mobQuickConditions');if(!box)return;mobActiveConditionFields=mobActiveConditionFields.filter(id=>fields.some(field=>field.id===id));box.innerHTML=mobActiveConditionFields.map(id=>{const field=fields.find(item=>item.id===id),value=mobConditionValue(id),removable=!mobDefaultConditionFields.includes(id);if(field.mode==='enum'){const values=[...new Set([...mobEnumValues(field),...rows.map(row=>String(row[id]||''))])].filter(Boolean);return `<div class="mob-quick-condition"><label>${esc(field.label)}</label><select data-mob-condition-field="${id}"><option value="">请选择</option>${values.map(item=>`<option value="${esc(item)}" ${item===value?'selected':''}>${esc(item)}</option>`).join('')}</select>${removable?`<button class="mob-quick-remove" onclick="removeMobQuickCondition('${id}')">×</button>`:''}</div>`}return `<div class="mob-quick-condition"><label>${esc(field.label)}</label><input data-mob-condition-field="${id}" value="${esc(value)}" placeholder="请输入搜索">${removable?`<button class="mob-quick-remove" onclick="removeMobQuickCondition('${id}')">×</button>`:''}</div>`}).join('');renderMobConditionMenu(document.getElementById('mobConditionMenuSearch')?.value||'')}

function bindDrag(th,id){th.draggable=true;th.ondragstart=e=>{if(e.target.closest('.filter'))return e.preventDefault();dragId=id;th.classList.add('dragging')};th.ondragover=e=>{e.preventDefault();th.classList.add('over')};th.ondragleave=()=>th.classList.remove('over');th.ondrop=e=>{e.preventDefault();move(id)};th.ondragend=clearDrag;let timer,active=false;th.onpointerdown=e=>{if(e.target.closest('.filter'))return;timer=setTimeout(()=>{active=true;dragId=id;th.classList.add('dragging')},450)};th.onpointermove=e=>{if(!active)return;document.querySelectorAll('.grid th').forEach(x=>x.classList.remove('over'));document.elementFromPoint(e.clientX,e.clientY)?.closest('th[data-id]')?.classList.add('over')};th.onpointerup=e=>{clearTimeout(timer);if(active){active=false;const target=document.elementFromPoint(e.clientX,e.clientY)?.closest('th[data-id]');if(target)move(target.dataset.id)}};th.onpointercancel=()=>{clearTimeout(timer);active=false;clearDrag()}}
function move(target){const from=fields.findIndex(f=>f.id===dragId),to=fields.findIndex(f=>f.id===target);if(from<0||to<0||fields[from].id==='actions'||fields[to].id==='actions')return clearDrag();fields.splice(to,0,fields.splice(from,1)[0]);clearDrag();render()}function clearDrag(){document.querySelectorAll('.grid th').forEach(x=>x.classList.remove('dragging','over'))}

function openFilter(e,id){e.stopPropagation();filterId=id;const f=fields.find(x=>x.id===id),p=document.getElementById('pop'),rect=e.currentTarget.getBoundingClientRect();document.getElementById('popTitle').textContent=(f.mode==='enum'?'枚举筛选：':'模糊查询：')+f.label;document.getElementById('fuzzy').style.display=f.mode==='fuzzy'?'block':'none';document.getElementById('enum').style.display=f.mode==='enum'?'block':'none';if(f.mode==='enum'){const selected=new Set(filters.get(id)?.values||[]),vals=[...new Set([...mobEnumValues(f),...rows.map(r=>String(r[id]||''))])].filter(Boolean);document.getElementById('enum').innerHTML=vals.map(v=>`<label><input type="checkbox" value="${esc(v)}" ${selected.has(v)?'checked':''}>${esc(v||'（空）')}</label>`).join('')}else{const old=filters.get(id);document.getElementById('operator').value=old?.op||'contains';document.getElementById('filterValue').value=old?.value||''}p.style.left=Math.max(8,Math.min(rect.left,innerWidth-278))+'px';p.style.top=Math.min(rect.bottom+6,innerHeight-310)+'px';p.classList.add('show')}

function openAddV2(){const excluded=new Set(['seq','actions','company','province','city','district','town']),dynamic=fields.filter(f=>!excluded.has(f.id)).map(f=>f.mode==='enum'?`<label>${esc(f.label)}${f.custom?'（自定义）':''}<select name="${f.id}"><option value="">请选择</option>${mobEnumValues(f).map(v=>`<option>${esc(v)}</option>`).join('')}</select></label>`:`<label>${esc(f.label)}${f.custom?'（自定义）':''}<input name="${f.id}" placeholder="请输入${esc(f.label)}"></label>`).join('');document.getElementById('sheetTitle').textContent='添加企业';document.getElementById('sheetBody').innerHTML=`<form class="sheet-form" novalidate onsubmit="addEnterpriseV2(event)"><nav class="mob-add-tabs"><button type="button" class="active" data-tab="basic" onclick="switchMobAddTab('basic')">基础信息</button><button type="button" data-tab="recruit" onclick="switchMobAddTab('recruit')">招聘信息</button><button type="button" data-tab="contract" onclick="switchMobAddTab('contract')">合同信息</button></nav><section class="mob-add-panel active" data-panel="basic"><label>企业名称 *<input name="company" maxlength="50" placeholder="请输入企业名称，限50字"></label><label>省 *<input name="province" placeholder="省"></label><label>市 *<input name="city" placeholder="市"></label><label>县/区<input name="district" placeholder="县/区"></label><label>镇<input name="town" placeholder="镇"></label><label>详细地址 *<input name="enterpriseAddress" placeholder="请输入详细地址"></label><div class="mini-map">⌖ 地图定位区域</div><label>打卡点<button type="button" onclick="alert('已新增打卡点')">＋ 新增打卡点</button></label><label>客户经理<select name="customerManager"><option value="">请选择</option><option>徐经理</option><option>梁经理</option></select></label><label>关联驻场 *<select name="relatedMarket"><option value="">请选择</option><option>中山驻场</option><option>深圳驻场</option></select></label><label>归属部门 *<select name="department"><option value="">请选择归属部门</option><option>驻场部</option><option>业务部</option></select></label><label>企业介绍 *<textarea name="enterpriseIntro" maxlength="300" placeholder="请输入企业介绍"></textarea></label><label>企业Logo<div class="media-tip">建议尺寸200*200px；jpg/png文件；大小不超过5M；如未上传，默认展示本小程序头像</div><span class="upload">＋ Logo</span></label><label>企业图片<div class="media-tip">建议尺寸750*400px；jpg/png文件；大小不超过5M；图片不多于5张；图片顺序支持拖动更改；</div><span class="upload">＋ 最多5张</span></label><label>企业视频<div class="media-tip">建议格式为mp4/avi的视频文件；大小不超过300M；视频不超过一个</div><div class="video-box">☁<br>点击或将视频拖拽到此处上传<br>支持的扩展名：mp4、avi</div></label></section><section class="mob-add-panel" data-panel="recruit">${dynamic}</section><section class="mob-add-panel" data-panel="contract"><label>合同名称 *<input name="contractName" placeholder="请输入合同名称"></label><label>合同编号<input name="contractNo" placeholder="请输入合同编号"></label><label>合同起止时间<div class="date-pair"><input name="contractStart" type="date"><span>~</span><input name="contractEnd" type="date"></div></label><label><input style="width:16px;height:16px" name="contractLong" type="checkbox"> 长期</label><label>合同到期提醒<div class="contract-reminders">${[1,3,5,7,10,15,20,30,60,90].map(d=>`<label><input type="checkbox" name="contractReminder" value="${d}">${d}日</label>`).join('')}</div></label><label>合同文件<div class="contract-upload">☁<br>将文件拖到此处，或点击上传</div></label><div class="contract-hint-mob">允许上传jpg、png、pdf文件，单个文件大小限2M，限上传10个文件</div></section><button class="save-add" type="submit">保存企业</button></form>`;openSheet()}
function openAddV3(){openAddV2();const basicTab=document.querySelector('.mob-add-tabs button[data-tab="basic"]'),recruitTab=document.querySelector('.mob-add-tabs button[data-tab="recruit"]');[basicTab,recruitTab].forEach(tab=>{if(tab){tab.style.position='relative'}});if(basicTab)basicTab.insertAdjacentHTML('beforeend','<span class="marker" onclick="showNote(event,6)">6</span>');if(recruitTab)recruitTab.insertAdjacentHTML('beforeend','<span class="marker" onclick="showNote(event,7)">7</span>');const excluded=new Set(['seq','actions','company','province','city','district','town']),businessFields=fields.filter(f=>!excluded.has(f.id)),labels=document.querySelectorAll('.mob-add-panel[data-panel="recruit"]>label');labels.forEach((label,index)=>{const field=businessFields[index],textNode=[...label.childNodes].find(node=>node.nodeType===3);if(textNode)textNode.remove();const caption=document.createElement('span');caption.className='mob-field-caption';caption.innerHTML=`${esc(field.label+(field.custom?'（自定义）':''))}<span class="marker" onclick="showMobRecruitFieldNote(event,'${field.id}',${index+8})">${index+8}</span>`;label.insertBefore(caption,label.firstChild)})}
function showMobRecruitFieldNote(e,id,no){e.stopPropagation();e.preventDefault();const field=fields.find(f=>f.id===id),isEnum=field.mode==='enum';document.getElementById('mobLogicNo').textContent=no;document.getElementById('mobLogicTitle').textContent='招聘信息 · '+field.label;document.getElementById('mobLogicContent').innerHTML=`<span class="mob-logic-tag">字段逻辑说明</span><h4>1、字段用途</h4><p>用于维护企业招聘信息中的“${esc(field.label)}”，并同步展示到客户列表。</p><h4>2、录入与维护规则</h4><ul><li>${isEnum?'添加企业时从枚举下拉选项中选择。':'添加企业时支持直接输入文本内容。'}</li><li>${isEnum?'枚举值在字段管理模块统一维护。':'字段显示名称可在字段管理模块修改。'}</li><li>系统预设字段和自定义字段使用相同保存规则。</li></ul><h4>3、筛选与结果</h4><p>${isEnum?'列表支持按枚举值多选筛选。':'列表支持模糊查询条件筛选。'}保存后字段值立即同步到列表。</p>`;document.querySelectorAll('.marker').forEach(marker=>marker.classList.toggle('selected',marker===e.currentTarget));document.getElementById('mobLogicCard').classList.add('show')}
function addEnterpriseV2(e){e.preventDefault();const form=new FormData(e.target),required=['company','province','city','enterpriseAddress','relatedMarket','department','enterpriseIntro'];if(required.some(name=>!String(form.get(name)||'').trim())){switchMobAddTab('basic');return alert('请完善基础信息中的必填项')}const record={};fields.forEach(f=>{if(!['seq','actions'].includes(f.id))record[f.id]=form.get(f.id)||'—'});record.company=form.get('company');record.province=form.get('province')||'—';record.city=form.get('city')||'—';record.district=form.get('district')||'—';record.town=form.get('town')||'—';rows.unshift(record);rows.forEach((r,i)=>r.seq=String(i+1));closeSheet();render();alert('企业已添加，列表字段已同步')}
const baseMobRender=render;render=function(){baseMobRender();renderMobConditionFields();const data=matched();document.querySelectorAll('.grid tbody tr').forEach((tr,index)=>{const cell=tr.querySelector('.ops'),recordIndex=rows.indexOf(data[index]);if(cell)cell.innerHTML=`<button onclick="editMobEnterprise(${recordIndex})">编辑</button><button onclick="deleteMobEnterprise(${recordIndex})">删除</button>`})}
function editMobEnterprise(index){const record=rows[index];openAddV3();document.getElementById('sheetTitle').textContent='企业详情';const form=document.querySelector('#sheetBody form');form.onsubmit=e=>saveMobEnterprise(e,index);['company','province','city','district','town'].forEach(name=>{if(form.elements[name])form.elements[name].value=record[name]||''});form.elements.enterpriseAddress.value=record.workAddress||'企业详细地址';form.elements.relatedMarket.value='中山驻场';form.elements.department.value='驻场部';form.elements.enterpriseIntro.value='企业资料由客户管理模块统一维护。';fields.filter(f=>form.elements[f.id]).forEach(field=>{const control=form.elements[field.id],value=record[field.id]||'';if(control.tagName==='SELECT'&&value&&![...control.options].some(option=>option.value===value))control.add(new Option(value,value));control.value=value})}
function saveMobEnterprise(e,index){e.preventDefault();const form=new FormData(e.target),required=['company','province','city','enterpriseAddress','relatedMarket','department','enterpriseIntro'];if(required.some(name=>!String(form.get(name)||'').trim())){switchMobAddTab('basic');return alert('请完善基础信息中的必填项')}fields.forEach(field=>{if(!['seq','actions'].includes(field.id))rows[index][field.id]=form.get(field.id)||'—'});rows[index].company=form.get('company');rows[index].province=form.get('province');rows[index].city=form.get('city');rows[index].district=form.get('district')||'—';rows[index].town=form.get('town')||'—';rows[index].workAddress=form.get('enterpriseAddress');closeSheet();render();alert('企业详情已保存')}
function deleteMobEnterprise(index){if(!confirm(`确认删除“${rows[index].company}”吗？`))return;rows.splice(index,1);rows.forEach((row,i)=>row.seq=String(i+1));render()}
const mobDictionaryIds=['education','ethnicity','gender','environment','employmentType','holidayWorker','settlement'];let activeMobDict='education';
function openMobDictionary(){document.getElementById('sheetTitle').textContent='字典管理';renderMobDictionary();openSheet()}
function renderMobDictionary(){const nav=mobDictionaryIds.map(id=>{const field=fields.find(f=>f.id===id);return `<button class="${id===activeMobDict?'active':''}" onclick="selectMobDictionary('${id}')">${esc(field.label)}</button>`}).join(''),field=fields.find(f=>f.id===activeMobDict),values=mobEnumValues(field);document.getElementById('sheetBody').innerHTML=`<div class="tip">招聘信息枚举值统一维护，修改后同步用于添加企业与列表筛选。</div><div class="dict-mobile-nav">${nav}</div><div>${values.map((value,index)=>`<div class="dict-mobile-row"><span>${index+1}</span><b>${esc(value)}</b><span><button onclick="editMobDictItem(${index})">编辑</button><button onclick="deleteMobDictItem(${index})">删除</button></span></div>`).join('')}</div><button class="save-add" onclick="addMobDictItem()">＋ 添加字典值</button>`}
function selectMobDictionary(id){activeMobDict=id;renderMobDictionary()}
function editMobDictItem(index){const field=fields.find(f=>f.id===activeMobDict),values=[...mobEnumValues(field)],value=prompt('编辑字典值',values[index]);if(!value?.trim())return;values[index]=value.trim();field.enumValues=values;renderMobDictionary()}
function deleteMobDictItem(index){const field=fields.find(f=>f.id===activeMobDict),values=[...mobEnumValues(field)];values.splice(index,1);field.enumValues=values;renderMobDictionary()}
function addMobDictItem(){const field=fields.find(f=>f.id===activeMobDict),values=[...mobEnumValues(field)],value=prompt('请输入新增字典值');if(!value?.trim()||values.includes(value.trim()))return;values.push(value.trim());field.enumValues=values;renderMobDictionary()}
function initFloatingAdd(){const button=document.getElementById('floatingAdd'),app=document.getElementById('app');let startX=0,startY=0,offsetX=0,offsetY=0,moved=false;button.addEventListener('pointerdown',e=>{const rect=button.getBoundingClientRect();startX=e.clientX;startY=e.clientY;offsetX=e.clientX-rect.left;offsetY=e.clientY-rect.top;moved=false;button.setPointerCapture?.(e.pointerId)});button.addEventListener('pointermove',e=>{if(!button.hasPointerCapture?.(e.pointerId))return;if(Math.hypot(e.clientX-startX,e.clientY-startY)>5)moved=true;if(!moved)return;const bounds=app.getBoundingClientRect(),left=Math.max(bounds.left+8,Math.min(e.clientX-offsetX,bounds.right-button.offsetWidth-8)),top=Math.max(bounds.top+8,Math.min(e.clientY-offsetY,bounds.bottom-button.offsetHeight-8));button.style.left=left+'px';button.style.top=top+'px';button.style.right='auto';button.style.bottom='auto'});button.addEventListener('pointerup',e=>{if(button.hasPointerCapture?.(e.pointerId))button.releasePointerCapture(e.pointerId);if(!moved)openAddV3()});button.addEventListener('pointercancel',()=>{moved=false})}
document.addEventListener('click',e=>{if(!e.target.closest('#pop')&&!e.target.closest('.filter'))closePop();if(!e.target.closest('.mob-add-condition'))document.getElementById('mobConditionMenu')?.classList.remove('show')});initFloatingAdd();render();
</script></body></html>
