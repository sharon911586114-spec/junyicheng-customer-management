<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>客户管理 · Mob端</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;min-height:100vh}

    /* 顶部导航栏 */
    .nav-bar{background:#1677ff;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;position:sticky;top:0;z-index:100}
    .nav-bar .nav-left{color:#fff;font-size:20px;cursor:pointer;width:36px}
    .nav-bar .nav-title{color:#fff;font-size:17px;font-weight:700}
    .nav-bar .nav-right .web-btn{background:rgba(255,255,255,.2);color:#fff;border:0;border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:3px}

    /* 逻辑批注提示条 */
    .annotation-bar{background:#fff9e6;border:1px solid #f5a000;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:13px}
    .annotation-bar.hidden{display:none}
    .annotation-bar .anno-left{display:flex;flex-direction:column}
    .annotation-bar .anno-title{font-weight:700;color:#333}
    .annotation-bar .anno-desc{color:#999;font-size:11px}
    .annotation-bar .anno-close{background:#1677ff;color:#fff;border:0;border-radius:4px;padding:4px 14px;font-size:12px;cursor:pointer}

    /* 搜索栏 */
    .search-bar{padding:10px 14px;background:#fff}
    .search-bar input{width:100%;height:40px;border:1px solid #e5e7eb;border-radius:8px;padding:0 14px;font-size:14px;color:#333;outline:none;background:#fff}
    .search-bar input::placeholder{color:#9ca3af}
    .search-bar input:focus{border-color:#1677ff}

    /* 表格区域 */
    .table-section{background:#fff;margin:0}
    .table-header-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0}
    .table-header-bar .enterprise-count{font-size:13px;color:#4b5563}
    .table-header-bar .enterprise-count b{color:#1677ff;font-weight:600}

    .data-table{width:100%;border-collapse:collapse}
    .data-table thead th{background:#f3f4f6;color:#6b7280;font-size:13px;font-weight:500;padding:10px 10px;text-align:left;border-bottom:1px solid #e5e7eb;white-space:nowrap}
    .data-table thead th.col-seq{text-align:center;width:60px}
    .data-table thead th .th-content{display:inline-flex;align-items:center;gap:4px}
    .data-table thead th .th-grip{color:#c5c9d2;font-size:12px}
    .data-table thead th .th-arrow{color:#9ca3af;font-size:10px;cursor:pointer}
    .data-table thead th .th-anno{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:#f5a000;color:#fff;font-size:9px;font-weight:700;margin-left:2px;cursor:pointer}
    .data-table tbody td{padding:14px 10px;font-size:14px;color:#333;border-bottom:1px solid #f3f4f6;text-align:left}
    .data-table tbody td.col-seq{text-align:center;color:#666}
    .data-table tbody tr:last-child td{border-bottom:0}
    .data-table tbody tr:hover{background:#f9fafb}

    /* 下拉筛选面板 */
    .sort-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200}
    .sort-overlay.show{display:block}
    .sort-sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;padding:16px 0 24px;z-index:201;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
    .sort-sheet .sheet-title{font-size:15px;font-weight:600;color:#333;padding:0 16px 12px;border-bottom:1px solid #f0f0f0}
    .sort-sheet .sheet-option{padding:14px 16px;font-size:15px;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
    .sort-sheet .sheet-option:active{background:#f5f5f5}
    .sort-sheet .sheet-option.selected{color:#1677ff}
    .sort-sheet .sheet-option.selected::after{content:'✓';color:#1677ff}
    .sort-sheet .sheet-cancel{padding:14px 16px;font-size:15px;color:#999;text-align:center;cursor:pointer;border-top:6px solid #f5f5f5;margin-top:8px}

    /* FAB */
    .fab-wrap{position:fixed;bottom:32px;right:24px;z-index:90;display:flex;flex-direction:column;align-items:center;gap:6px}
    .fab{width:64px;height:64px;border-radius:50%;background:#1677ff;color:#fff;border:0;font-size:32px;cursor:pointer;box-shadow:0 4px 14px rgba(22,119,255,.4);display:flex;align-items:center;justify-content:center;line-height:1;transition:box-shadow .2s}
    .fab:active{box-shadow:0 2px 8px rgba(22,119,255,.3)}
    .fab-label{color:#666;font-size:12px}

    /* Toast */
    .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
    .toast.show{opacity:1}
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <div class="nav-bar">
    <span class="nav-left" onclick="history.back()">←</span>
    <span class="nav-title">客户管理 · Mob端</span>
    <span class="nav-right">
      <button class="web-btn" onclick="location.href='../web/index.html'">Web ↗</button>
    </span>
  </div>

  <!-- 逻辑批注提示条 -->
  <div class="annotation-bar" id="annotationBar">
    <div class="anno-left">
      <span class="anno-title">逻辑批注</span>
      <span class="anno-desc">点击橙色编号查看对应需求规则</span>
    </div>
    <button class="anno-close" onclick="document.getElementById('annotationBar').classList.add('hidden')">关闭</button>
  </div>

  <!-- 搜索栏 -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索企业名称、地区、岗位等信息" oninput="filterTable()">
  </div>

  <!-- 数据表格 -->
  <div class="table-section">
    <div class="table-header-bar">
      <span></span>
      <span class="enterprise-count">企业数：<b id="enterpriseCount">3</b>家</span>
    </div>
    <table class="data-table" id="dataTable">
      <thead>
        <tr>
          <th class="col-seq">
            <div class="th-content">
              <span class="th-anno" onclick="showAnno(1)" title="需求规则 #1">①</span>
            </div>
          </th>
          <th>
            <div class="th-content">
              <span class="th-grip">⋮⋮</span> 省
              <span class="th-arrow" onclick="openSortSheet('province')">⌄</span>
              <span class="th-anno" onclick="showAnno(4)" title="需求规则 #4">④</span>
            </div>
          </th>
          <th>
            <div class="th-content">
              <span class="th-grip">⋮⋮</span> 市
              <span class="th-arrow" onclick="openSortSheet('city')">⌄</span>
            </div>
          </th>
          <th>
            <div class="th-content">
              <span class="th-grip">⋮⋮</span> 县/区
            </div>
          </th>
        </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>
  </div>

  <!-- FAB -->
  <div class="fab-wrap">
    <button class="fab" onclick="showToast('新增企业功能开发中')">＋</button>
    <span class="fab-label">新增企业</span>
  </div>

  <!-- 排序筛选面板 -->
  <div class="sort-overlay" id="sortOverlay" onclick="closeSortSheet()">
    <div class="sort-sheet" onclick="event.stopPropagation()">
      <div class="sheet-title" id="sortTitle">排序/筛选</div>
      <div class="sheet-option" onclick="sortData('all')" id="optAll">全部</div>
      <div id="sortOptionList"></div>
      <div class="sheet-cancel" onclick="closeSortSheet()">取消</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const seedData = [
      { seq: '1', province: '天津市',  city: '天津市', district: '津南区' },
      { seq: '2', province: '湖南省',  city: '湘潭市', district: '雨湖区' },
      { seq: '3', province: '浙江省',  city: '台州市', district: '黄岩区' },
    ];

    let currentSortField = '';
    let filteredData = [...seedData];

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = data.map((row, i) => `
        <tr>
          <td class="col-seq">${i + 1}</td>
          <td>${row.province}</td>
          <td>${row.city}</td>
          <td>${row.district}</td>
        </tr>
      `).join('');
      document.getElementById('enterpriseCount').textContent = data.length;
    }

    function filterTable() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!query) {
        filteredData = [...seedData];
      } else {
        filteredData = seedData.filter(row =>
          row.province.toLowerCase().includes(query) ||
          row.city.toLowerCase().includes(query) ||
          row.district.toLowerCase().includes(query)
        );
      }
      renderTable(filteredData);
    }

    function openSortSheet(field) {
      currentSortField = field;
      document.getElementById('sortTitle').textContent = field === 'province' ? '省 - 排序/筛选' : '市 - 排序/筛选';
      const values = [...new Set(seedData.map(r => r[field]))];
      document.getElementById('sortOptionList').innerHTML =
        '<div class="sheet-option selected" onclick="sortData(\'all\')">全部</div>' +
        values.map(v => `<div class="sheet-option" onclick="sortData('${v}')">${v}</div>`).join('');
      document.getElementById('sortOverlay').classList.add('show');
    }

    function sortData(value) {
      if (value === 'all') {
        filteredData = [...seedData].filter(r => {
          const q = document.getElementById('searchInput').value.trim().toLowerCase();
          return !q || r.province.toLowerCase().includes(q) || r.city.toLowerCase().includes(q) || r.district.toLowerCase().includes(q);
        });
      } else {
        filteredData = seedData.filter(r => r[currentSortField] === value);
      }
      renderTable(filteredData);
      closeSortSheet();
    }

    function closeSortSheet() {
      document.getElementById('sortOverlay').classList.remove('show');
    }

    function showAnno(num) {
      showToast(`需求规则 #${num}：点击橙色编号查看对应需求规则`);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // 初始渲染
    renderTable(seedData);
  </script>
</body>
</html>
