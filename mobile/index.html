<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:PingFang SC,-apple-system,BlinkMacSystemFont,sans-serif;background:#e8ecf1;display:flex;flex-direction:column;align-items:center;padding:30px 20px;min-height:100vh;color:#333}

/* 手机外壳 */
.phone-shell{width:375px;background:#000;border-radius:36px;padding:12px;box-shadow:0 20px 60px rgba(0,0,0,.35),0 0 0 2px #1a1a1a,0 0 0 4px #2d2d2d,0 0 0 6px #1a1a1a;margin-bottom:24px;position:relative}
.phone-screen{background:#f5f5f5;border-radius:26px;overflow:hidden;height:700px;display:flex;flex-direction:column;position:relative}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:28px;background:#000;border-radius:0 0 18px 18px;z-index:20}

/* 状态栏 */
.status-bar{background:#fff;padding:10px 24px 6px;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;color:#000;position:relative;z-index:10}
.status-time{font-weight:700}
.status-icons{display:flex;align-items:center;gap:5px;font-size:11px;color:#333}

/* 导航栏 */
.nav-bar{background:#fff;padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #ececec;position:relative;z-index:10}
.nav-back{font-size:20px;color:#333;text-decoration:none;cursor:pointer;width:32px;text-align:center;line-height:32px;user-select:none}
.nav-title{flex:1;text-align:center;font-size:17px;font-weight:600;color:#000}

/* 搜索栏 */
.search-bar{padding:10px 16px;background:#fff;position:relative;z-index:10}
.search-input-wrap{background:#f5f5f5;border-radius:20px;padding:8px 14px;display:flex;align-items:center;gap:8px}
.search-icon{font-size:15px;color:#999;flex-shrink:0}
.search-input{border:0;background:transparent;outline:none;flex:1;font-size:14px;color:#333}
.search-input::placeholder{color:#b0b0b0}

/* 筛选标签 */
.filter-tags{background:#fff;padding:8px 16px 12px;display:flex;gap:8px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;border-bottom:1px solid #f0f0f0;scrollbar-width:none}
.filter-tags::-webkit-scrollbar{display:none}
.filter-tag{flex-shrink:0;padding:6px 14px;border-radius:16px;font-size:13px;cursor:pointer;user-select:none;background:#f5f5f5;color:#666;border:1px solid transparent;transition:all .2s}
.filter-tag.active{background:#e6f0ff;color:#1677ff;border-color:#1677ff;font-weight:500}

/* 计数栏 */
.count-bar{background:#fff;padding:8px 16px;font-size:13px;color:#888;border-bottom:1px solid #f0f0f0}
.count-bar b{color:#1677ff;font-weight:600}

/* 列表滚动区域 */
.list-scroll{flex:1;overflow-y:auto;padding:10px 16px;-webkit-overflow-scrolling:touch}

/* 客户卡片 */
.card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.04);position:relative}
.card-company{font-size:16px;font-weight:700;color:#1677ff;margin-bottom:8px;line-height:1.3}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.card-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:#e6f0ff;color:#1677ff;border:1px solid #b3d4ff}
.card-tag.is-second{background:#fff7e6;color:#d46b08;border-color:#ffd591}
.card-tag.is-holiday{background:#f6ffed;color:#389e0d;border-color:#b7eb8f}
.card-info{font-size:13px;color:#555;margin-bottom:4px;display:flex;gap:12px;flex-wrap:wrap}
.card-info .salary{color:#ef7a31;font-weight:700}
.card-addr{font-size:12px;color:#999;margin-bottom:10px;display:flex;align-items:center;gap:4px}
.card-addr-icon{font-size:14px}
.card-actions{display:flex;gap:8px;border-top:1px solid #f5f5f5;padding-top:10px}
.card-btn{flex:1;text-align:center;padding:7px 0;border-radius:6px;font-size:13px;cursor:pointer;user-select:none;transition:all .15s}
.card-btn-detail{background:#1677ff;color:#fff;border:0}
.card-btn-detail:active{background:#125ec7}
.card-btn-call{background:#fff;color:#1677ff;border:1px solid #1677ff}
.card-btn-call:active{background:#e6f0ff}

/* 底部 TabBar */
.tab-bar{background:#fff;display:flex;border-top:1px solid #ececec;padding:4px 0 env(safe-area-inset-bottom,0);position:relative;z-index:10}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;font-size:10px;color:#999;cursor:pointer;user-select:none;text-decoration:none;transition:color .2s}
.tab-icon{font-size:22px;margin-bottom:2px;line-height:1}
.tab-item.active{color:#1677ff}
.tab-item.active .tab-icon{color:#1677ff}

/* 详情弹窗遮罩 */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;display:none;justify-content:center;align-items:flex-end}
.detail-overlay.show{display:flex}
.detail-overlay.show .detail-sheet{transform:translateY(0)}
.detail-sheet{background:#fff;width:100%;max-width:500px;max-height:75vh;border-radius:16px 16px 0 0;overflow:hidden;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1)}
.detail-sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;background:#fff;z-index:5}
.detail-sheet-head h3{font-size:17px;color:#000;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-close{width:28px;height:28px;border-radius:50%;background:#f5f5f5;border:0;cursor:pointer;font-size:18px;color:#666;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:12px}
.detail-sheet-body{overflow-y:auto;padding:16px 20px;flex:1}
.detail-field{display:flex;padding:10px 0;border-bottom:1px solid #f8f8f8;font-size:14px}
.detail-label{color:#888;width:130px;flex-shrink:0;font-size:13px}
.detail-value{color:#333;flex:1;word-break:break-all}

/* 下拉手柄 */
.sheet-handle{width:36px;height:5px;background:#d9d9d9;border-radius:3px;margin:8px auto 0}

/* 空状态 */
.empty-state{text-align:center;padding:60px 20px;color:#bbb;font-size:14px}
</style>
</head>
<body>

<!-- 手机外壳 -->
<div class="phone-shell">
  <div class="phone-screen">
    <div class="phone-notch"></div>

    <!-- 状态栏 -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <span class="status-icons">▮▮▮▮ ▊ WiFi ▋▋▋ 86%</span>
    </div>

    <!-- 导航栏 -->
    <div class="nav-bar">
      <a class="nav-back">&larr;</a>
      <span class="nav-title">客户管理</span>
    </div>

    <!-- 搜索栏 -->
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">&#128269;</span>
        <input class="search-input" placeholder="搜索企业名称" id="searchInput" oninput="applyFilters()">
      </div>
    </div>

    <!-- 筛选标签 -->
    <div class="filter-tags" id="filterTags">
      <span class="filter-tag active" data-filter="all" onclick="setFilter('all',this)">全部</span>
      <span class="filter-tag" data-filter="一手单" onclick="setFilter('orderType:一手单',this)">一手单</span>
      <span class="filter-tag" data-filter="二手单" onclick="setFilter('orderType:二手单',this)">二手单</span>
      <span class="filter-tag" data-filter="天津市" onclick="setFilter('province:天津市',this)">天津市</span>
      <span class="filter-tag" data-filter="湖南省" onclick="setFilter('province:湖南省',this)">湖南省</span>
      <span class="filter-tag" data-filter="浙江省" onclick="setFilter('province:浙江省',this)">浙江省</span>
    </div>

    <!-- 计数栏 -->
    <div class="count-bar">共 <b id="companyCount">3</b> 家企业</div>

    <!-- 列表 -->
    <div class="list-scroll" id="listScroll"></div>

    <!-- 底部 TabBar -->
    <div class="tab-bar">
      <a class="tab-item"><span class="tab-icon">&#127968;</span>首页</a>
      <a class="tab-item active"><span class="tab-icon">&#128101;</span>客户管理</a>
      <a class="tab-item"><span class="tab-icon">&#9993;</span>消息</a>
      <a class="tab-item"><span class="tab-icon">&#128100;</span>我的</a>
    </div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div class="detail-sheet-head">
      <h3 id="detailTitle">企业详情</h3>
      <button class="detail-close" onclick="closeDetail()">&times;</button>
    </div>
    <div class="detail-sheet-body" id="detailBody"></div>
  </div>
</div>

<script>
// ===== 字段定义（systemFields，40字段）=====
const fieldDefs = [
  {id:'seq',label:'序号'},{id:'province',label:'省'},{id:'city',label:'市'},{id:'district',label:'县/区'},{id:'town',label:'镇'},
  {id:'orderType',label:'一二手单'},{id:'company',label:'企业名称'},{id:'interviewContact',label:'面试对接人名字+电话'},
  {id:'highlights',label:'企业亮点'},{id:'demand',label:'近30天内需求人数'},{id:'environment',label:'工作环境'},
  {id:'employmentType',label:'用工性质'},{id:'holidayWorker',label:'是否要寒暑假工'},{id:'position',label:'招聘岗位'},
  {id:'gender',label:'性别要求'},{id:'age',label:'年龄要求'},{id:'ethnicity',label:'民族'},{id:'household',label:'户籍要求'},
  {id:'documents',label:'证件要求'},{id:'education',label:'学历要求'},{id:'hardRequirements',label:'其他硬性要求'},
  {id:'jobContent',label:'工作内容'},{id:'workHours',label:'工作时间'},{id:'meal',label:'食宿'},{id:'salary',label:'薪资待遇'},
  {id:'salaryDetail',label:'具体薪酬计算明细'},{id:'subsidy',label:'其他和钱相关补贴'},{id:'settlement',label:'结算方式'},
  {id:'payday',label:'发薪日'},{id:'payrollDesc',label:'发薪说明'},{id:'workAddress',label:'工作地点'},
  {id:'interviewAddress',label:'面试地点'},{id:'interviewDress',label:'面试携带/着装要求'},
  {id:'interviewTime',label:'面试时间'},{id:'interviewProcess',label:'面试-入职流程'},
  {id:'onboardingMaterials',label:'入职材料/通知模板'},{id:'onboardingFee',label:'入职费用'},
  {id:'keywords',label:'补充亮点关键词'}
];

// ===== 客户数据（seedData，3条）=====
const customers = [
  {seq:'1',province:'天津市',city:'天津市',district:'津南区',town:'海河教育园',orderType:'一手单',company:'天津六合时利和电子有限公司',
   interviewContact:'李经理 15620433222',highlights:'恒温车间、管理规范',demand:'30人',environment:'空调车间，坐班为主',
   employmentType:'正式工',holidayWorker:'否',position:'操作员 / 质检员',gender:'男女不限',age:'20–45岁',ethnicity:'不限',
   household:'不限',documents:'身份证原件',education:'初中及以上',hardRequirements:'无大面积纹身',jobContent:'电子零部件组装与质检',
   workHours:'两班倒，月休4天',meal:'包住 / 餐补',salary:'5500–7500元',salaryDetail:'底薪+加班费+绩效',subsidy:'夜班补贴20元/天',
   settlement:'月结',payday:'每月15日',payrollDesc:'银行卡发薪',workAddress:'海河教育园区雅深路8号',interviewAddress:'企业南门招聘中心',
   interviewDress:'身份证、黑色水笔；着装整洁',interviewTime:'工作日 9:00–17:00',interviewProcess:'面试→体检→培训→上岗',
   onboardingMaterials:'身份证复印件2张、照片4张',onboardingFee:'体检费100元',keywords:'晋升快、留任奖'},
  {seq:'2',province:'湖南省',city:'湘潭市',district:'雨湖区',town:'九华街道',orderType:'一手单',company:'湖南吉利汽车部件有限公司',
   interviewContact:'梁经理 138****2186',highlights:'大型汽车集团、订单稳定',demand:'50人',environment:'自动化生产线',
   employmentType:'派遣工',holidayWorker:'否',position:'装配工 / 质检',gender:'男',age:'18–45岁',ethnicity:'不限',
   household:'不限',documents:'身份证',education:'初中及以上',hardRequirements:'能适应倒班',jobContent:'汽车零部件装配',
   workHours:'8:00–20:00 两班倒',meal:'包吃住',salary:'6000–8500元',salaryDetail:'计时工资+加班费',subsidy:'满勤奖300元',
   settlement:'月结',payday:'每月20日',payrollDesc:'遇节假日顺延',workAddress:'雨湖区吉利西路',interviewAddress:'吉利西路公交站集合',
   interviewDress:'携带身份证',interviewTime:'周一至周五',interviewProcess:'集合→面试→体检→入职',
   onboardingMaterials:'身份证、银行卡',onboardingFee:'无',keywords:'包吃住、工作稳定'},
  {seq:'3',province:'浙江省',city:'台州市',district:'黄岩区',town:'院桥镇',orderType:'二手单',company:'台州爱玛机车制造有限公司',
   interviewContact:'姬经理 189****7042',highlights:'知名品牌、宿舍条件好',demand:'20人',environment:'标准化车间',
   employmentType:'派遣工',holidayWorker:'是',position:'普工 / 仓管',gender:'男女不限',age:'18–48岁',ethnicity:'不限',
   household:'不限',documents:'身份证',education:'不限',hardRequirements:'识字，会写姓名',jobContent:'电动车零部件生产',
   workHours:'长白班为主',meal:'工作餐 / 宿舍',salary:'6500–9000元',salaryDetail:'计件工资，多劳多得',subsidy:'高温补贴、工龄奖',
   settlement:'月结',payday:'每月18日',payrollDesc:'企业统一发薪',workAddress:'黄岩区院桥镇',interviewAddress:'厂区一号门',
   interviewDress:'运动鞋、长裤',interviewTime:'每周二、四',interviewProcess:'面试→分配岗位→入职',
   onboardingMaterials:'身份证、1寸照片',onboardingFee:'无',keywords:'长白班、可接受暑假工'}
];

// ===== 状态 =====
let currentFilter = 'all';

// ===== 筛选逻辑 =====
function applyFilters(){
  const keyword = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  let filtered = customers;

  if(currentFilter !== 'all'){
    const [field, val] = currentFilter.split(':');
    filtered = filtered.filter(c => c[field] === val);
  }

  if(keyword){
    filtered = filtered.filter(c => c.company.toLowerCase().includes(keyword));
  }

  renderCards(filtered);
}

function setFilter(filterVal, el){
  currentFilter = filterVal;
  document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

// ===== 渲染卡片 =====
function renderCards(list){
  document.getElementById('companyCount').textContent = list.length;
  const container = document.getElementById('listScroll');

  if(!list.length){
    container.innerHTML = '<div class="empty-state">没有符合条件的企业</div>';
    return;
  }

  container.innerHTML = list.map(c => {
    const tags = [];
    tags.push(`<span class="card-tag ${c.orderType==='二手单'?'is-second':''}">${html(c.orderType)}</span>`);
    if(c.employmentType) tags.push(`<span class="card-tag">${html(c.employmentType)}</span>`);
    if(c.holidayWorker) tags.push(`<span class="card-tag is-holiday">${html(c.holidayWorker)==='是'?'寒暑假工':'非寒暑假工'}</span>`);
    if(c.keywords) {
      c.keywords.split('、').slice(0,2).forEach(k => { if(k.trim()) tags.push(`<span class="card-tag">${html(k.trim())}</span>`); });
    }

    const addr = [c.province, c.city, c.district, c.town].filter(v => v && v !== '—').join('');

    return `
      <div class="card" onclick="showDetail('${c.company}')">
        <div class="card-company">${html(c.company)}</div>
        <div class="card-tags">${tags.join('')}</div>
        <div class="card-info">
          <span>${html(c.position||'—')}</span>
          <span>需求 ${html(c.demand||'—')}</span>
          <span class="salary">${html(c.salary||'—')}</span>
        </div>
        <div class="card-addr"><span class="card-addr-icon">&#128205;</span>${html(addr)}</div>
        <div class="card-actions">
          <button class="card-btn card-btn-detail" onclick="event.stopPropagation();showDetail('${c.company}')">&#128269; 查看详情</button>
          <button class="card-btn card-btn-call" onclick="event.stopPropagation();callContact('${html(c.interviewContact||'')}')">&#128222; 拨打联系</button>
        </div>
      </div>`;
  }).join('');
}

// ===== 详情弹窗 =====
function showDetail(companyName){
  const c = customers.find(x => x.company === companyName);
  if(!c) return;

  document.getElementById('detailTitle').textContent = c.company;
  document.getElementById('detailBody').innerHTML = fieldDefs
    .filter(f => f.id !== 'seq')
    .map(f => {
      const val = c[f.id] || '—';
      return `<div class="detail-field"><span class="detail-label">${html(f.label)}</span><span class="detail-value">${html(val)}</span></div>`;
    }).join('');

  document.getElementById('detailOverlay').classList.add('show');
}

function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('show');
}

// ===== 拨打联系 =====
function callContact(contactStr){
  const phone = (contactStr||'').replace(/[^\d]/g,'').replace(/.*?(\d{11}).*/,'$1');
  if(/^\d{11}$/.test(phone)){
    alert('拨打：' + phone);
  } else {
    alert('联系人信息：' + contactStr);
  }
}

// ===== 工具函数 =====
function html(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ===== 初始化 =====
renderCards(customers);
</script>

</body>
</html>
