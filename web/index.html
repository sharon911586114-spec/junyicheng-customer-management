    function setupTable(){const head=table.tHead.rows[0],body=table.tBodies[0];fields.forEach(field=>{const th=document.createElement('th');th.dataset.fieldId=field.id;head.appendChild(th)});seedData.forEach(record=>{const row=body.insertRow();fields.forEach(field=>{const cell=row.insertCell();cell.dataset.fieldId=field.id;if(field.id==='select')cell.innerHTML='<input type="checkbox" class="rowCheck" aria-label="选择客户">';else if(field.id==='actions'){cell.className='ops';cell.innerHTML='<button onclick="rowAction(event,\'编辑\')">编辑</button><button onclick="rowAction(event,\'详情\')">详情</button>'}else{cell.textContent=record[field.id]||'—';if(field.id==='company')cell.className='link';if(field.id==='salary')cell.className='salary'}})});document.getElementById('total').textContent=seedData.length;renderHeaders()}
    function renderHeaders(){fields.forEach((field,index)=>{const th=table.tHead.rows[0].cells[index];th.dataset.fieldId=field.id;th.className=field.id==='select'?'':field.id==='actions'?'':'field-head';th.draggable=!['select','actions'].includes(field.id);if(field.id==='select')th.innerHTML='<input type="checkbox" id="selectAll" aria-label="全选">';else if(field.id==='actions')th.textContent=field.label;else{th.innerHTML=`<span class="th-grip">⋮⋮</span><span>${escapeHtml(field.label)}</span><button class="head-filter ${columnFilters.has(field.id)?'active':''}" onclick="openColumnFilter(event,'${field.id}')" title="${field.filterMode==='enum'?'枚举筛选':'模糊查询'}：${escapeHtml(field.label)}">⌄</button>`;bindHeaderDrag(th,field.id)}});const select=document.getElementById('selectAll');if(select)select.onchange=e=>document.querySelectorAll('.rowCheck').forEach(x=>{if(x.closest('tr').style.display!=='none')x.checked=e.target.checked})}
    function bindHeaderDrag(th,id){th.ondragstart=e=>{if(e.target.closest('.head-filter')){e.preventDefault();return}dragFieldId=id;th.classList.add('dragging');e.dataTransfer.effectAllowed='move'};th.ondragend=()=>{th.classList.remove('dragging');document.querySelectorAll('th.field-head').forEach(x=>x.classList.remove('drag-over'))};th.ondragover=e=>{e.preventDefault();th.classList.add('drag-over')};th.ondragleave=()=>th.classList.remove('drag-over');th.ondrop=e=>{e.preventDefault();th.classList.remove('drag-over');moveField(dragFieldId,id)}}
    function matchedRows(){const q=document.getElementById('search').value.trim().toLowerCase(),region=document.getElementById('region').value;return [...table.tBodies[0].rows].filter(row=>{if(q&&!row.textContent.toLowerCase().includes(q))return false;if(region!=='全部地区'&&!cellValue(row,'province').includes(region))return false;for(const [id,rule] of columnFilters){const value=cellValue(row,id).toLowerCase();if(rule.mode==='enum'){if(!rule.values.some(v=>v.toLowerCase()===value))return false;continue}const target=rule.value.toLowerCase();if(rule.operator==='contains'&&!value.includes(target))return false;if(rule.operator==='equals'&&value!==target)return false;if(rule.operator==='notContains'&&value.includes(target))return false;if(rule.operator==='empty'&&value&&value!=='—')return false;if(rule.operator==='notEmpty'&&(!value||value==='—'))return false}return true})}
    function filterRows(reset=true){if(reset)currentPage=1;const matched=matchedRows(),pages=Math.max(1,Math.ceil(matched.length/pageSize));currentPage=Math.min(currentPage,pages);[...table.tBodies[0].rows].forEach(row=>row.style.display='none');matched.slice((currentPage-1)*pageSize,currentPage*pageSize).forEach(row=>row.style.display='');document.getElementById('count').textContent=matched.length;document.getElementById('pageNo').textContent=currentPage+' / '+pages;document.getElementById('prev').disabled=currentPage===1;document.getElementById('next').disabled=currentPage===pages;const select=document.getElementById('selectAll');if(select)select.checked=false;renderFilterChips()}

    function renderColumns(){const box=document.getElementById('columns');box.innerHTML='';fields.filter(f=>!['select','actions'].includes(f.id)).forEach(field=>{const item=document.createElement('div');item.className='col';item.draggable=true;item.dataset.fieldId=field.id;item.innerHTML=`<span class="grip" title="长按拖拽">⠿</span><input type="checkbox" ${field.hidden?'':'checked'} data-field-id="${field.id}"><b class="field-name">${escapeHtml(field.label)}</b><select class="filter-type" title="配置筛选方式" onchange="setFilterMode('${field.id}',this.value)"><option value="fuzzy" ${field.filterMode==='fuzzy'?'selected':''}>模糊查询</option><option value="enum" ${field.filterMode==='enum'?'selected':''}>枚举筛选</option></select><span class="badge ${field.type==='custom'?'custom':''}">${field.type==='custom'?'自定义':'系统'}</span><span class="col-actions"><button type="button" onclick="openFieldModal('rename','${field.id}')" title="修改名称">✎</button>${field.type==='custom'?`<button type="button" onclick="deleteCustomField('${field.id}')" title="删除字段">×</button>`:''}</span>`;item.addEventListener('dragstart',e=>{if(e.target.closest('select,button,input')){e.preventDefault();return}dragFieldId=field.id;item.classList.add('dragging');e.dataTransfer.effectAllowed='move'});item.addEventListener('dragend',()=>{item.classList.remove('dragging');document.querySelectorAll('.col').forEach(x=>x.classList.remove('drag-over'))});item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over')});item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));item.addEventListener('drop',e=>{e.preventDefault();item.classList.remove('drag-over');moveField(dragFieldId,field.id)});box.appendChild(item)})}
    function setFilterMode(id,mode){const field=fieldById(id);field.filterMode=mode;columnFilters.delete(id);renderHeaders();filterRows();toast(`“${field.label}”已设为${mode==='enum'?'枚举值筛选':'模糊查询'}`)}
    function moveField(sourceId,targetId){if(!sourceId||sourceId===targetId)return;const from=fieldIndex(sourceId),to=fieldIndex(targetId);if(from<1||to<1||from>=fields.length-1||to>=fields.length-1)return;[...table.rows].forEach(row=>{const moving=row.cells[from],target=row.cells[to];row.insertBefore(moving,from<to?target.nextSibling:target)});fields.splice(to,0,fields.splice(from,1)[0]);renderHeaders();renderColumns();filterRows(false)}
    function resetColumns(){const customIds=fields.filter(f=>f.type==='custom').map(f=>f.id),order=[...defaultOrder.slice(0,-1),...customIds,'actions'];order.forEach((id,target)=>{const current=fieldIndex(id);if(current!==target){[...table.rows].forEach(row=>{const moving=row.cells[current],targetCell=row.cells[target];row.insertBefore(moving,current<target?targetCell.nextSibling:targetCell)});fields.splice(target,0,fields.splice(current,1)[0])}});fields.forEach(f=>f.hidden=false);applyHidden();renderHeaders();renderColumns();toast('已恢复默认顺序和显示状态')}

    function openFieldModal(mode,id=''){editingFieldId=mode==='rename'?id:'';const field=editingFieldId?fieldById(editingFieldId):null;document.getElementById('fieldModalTitle').textContent=field?'修改字段名称':'新增自定义字段';document.getElementById('fieldModalDesc').textContent=field?(field.type==='system'?'系统预设字段支持自定义显示名称':'修改自定义字段名称'):'创建后将立即显示在客户表格中';document.getElementById('fieldName').value=field?field.label:'';document.getElementById('fieldModal').classList.add('show');setTimeout(()=>document.getElementById('fieldName').focus(),30)}

    function submitField(e){e.preventDefault();const name=document.getElementById('fieldName').value.trim();if(!name)return;if(fields.some(f=>f.label===name&&f.id!==editingFieldId)){toast('字段名称不能重复');return}if(editingFieldId){const field=fieldById(editingFieldId),old=field.label;field.label=name;if(columnFilters.has(editingFieldId))columnFilters.get(editingFieldId).label=name;renderHeaders();renderColumns();toast(`字段“${old}”已改名为“${name}”`)}else{const id='custom_'+Date.now(),field={id,label:name,type:'custom',hidden:false,filterMode:'fuzzy'},insertAt=fields.length-1;fields.splice(insertAt,0,field);[...table.rows].forEach((row,rowIndex)=>{const cell=row.insertCell(insertAt);cell.dataset.fieldId=id;cell.textContent=rowIndex===0?name:'—'});renderHeaders();renderColumns();toast(`已新增自定义字段“${name}”`)}closeFieldModal();filterRows(false)}
    function deleteCustomField(id){const field=fieldById(id);if(!field||field.type!=='custom')return;const index=fieldIndex(id);[...table.rows].forEach(row=>row.deleteCell(index));fields.splice(index,1);columnFilters.delete(id);renderHeaders();renderColumns();filterRows();toast(`已删除自定义字段“${field.label}”`)}
    function openColumnFilter(e,id){e.stopPropagation();filteringFieldId=id;const field=fieldById(id),pop=document.getElementById('filterPop'),rule=columnFilters.get(id),rect=e.currentTarget.getBoundingClientRect();document.getElementById('filterTitle').textContent=(field.filterMode==='enum'?'枚举筛选：':'模糊查询：')+field.label;document.getElementById('fuzzyFilter').style.display=field.filterMode==='fuzzy'?'block':'none';document.getElementById('enumFilter').style.display=field.filterMode==='enum'?'block':'none';if(field.filterMode==='fuzzy'){document.getElementById('filterOperator').value=rule?.operator||'contains';document.getElementById('filterValue').value=rule?.value||'';toggleFilterInput()}else{const selected=new Set(rule?.values||[]),values=[...new Set([...table.tBodies[0].rows].map(row=>cellValue(row,id)))].sort(),list=document.getElementById('enumList');list.innerHTML=values.map(value=>`<label><input type="checkbox" value="${escapeHtml(value)}" ${selected.has(value)?'checked':''}><span>${escapeHtml(value||'（空）')}</span></label>`).join('')}pop.style.left=Math.min(rect.left,window.innerWidth-295)+'px';pop.style.top=(rect.bottom+6)+'px';pop.classList.add('show')}

    function renderFilterChips(){const hint=document.querySelector('.hint');let chips=hint.querySelector('.filter-chips');if(!chips){chips=document.createElement('span');chips.className='filter-chips';hint.appendChild(chips)}chips.innerHTML='';columnFilters.forEach((rule,id)=>{const field=fieldById(id);if(!field)return;let description;if(rule.mode==='enum')description='属于 '+rule.values.map(v=>v||'（空）').join('、');else{const label={contains:'包含',equals:'等于',notContains:'不包含',empty:'为空',notEmpty:'不为空'}[rule.operator];description=label+(rule.value?' “'+rule.value+'”':'')}const chip=document.createElement('span');chip.className='filter-chip';chip.innerHTML=`${escapeHtml(field.label)} ${escapeHtml(description)}<button onclick="clearFieldFilter('${id}')">×</button>`;chips.appendChild(chip)})}
